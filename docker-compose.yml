services:
  postgres:
    image: postgres:14
    environment:
      POSTGRES_USER: drop
      POSTGRES_PASSWORD: drop
      POSTGRES_DB: drop
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U drop -d drop"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  apiserver:
    build:
      context: ./apiserver
    ports:
      - "8191:8191"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DROP_PG_DSN: "host=postgres port=5432 user=drop password=drop dbname=drop sslmode=disable"
      DROP_S3_ENDPOINT: "minio:9000"
      DROP_S3_ACCESS_KEY: "minioadmin"
      DROP_S3_SECRET_KEY: "minioadmin"
      DROP_S3_BUCKET: "drop-data"
      DROP_GRPC_ADDR: "drop_server:50051"
    command: ["-c", "/etc/drop/apiserver.yaml", "-dev-mode"]

  web:
    build:
      context: ./web_frontend
    ports:
      - "80:80"
    depends_on:
      - apiserver

  drop_server:
    build:
      context: .
      dockerfile: drop/Dockerfile
    command: ["/opt/drop/drop_server", "-foreground", "-pg_dsn", "host=postgres port=5432 user=drop password=drop dbname=drop sslmode=disable", "-port", "50051"]
    network_mode: host
    depends_on:
      postgres:
        condition: service_healthy

  drop_agent:
    build:
      context: .
      dockerfile: drop/Dockerfile
    privileged: true
    pid: host
    volumes:
      - /sys/fs/bpf:/sys/fs/bpf
      - /sys/kernel/debug:/sys/kernel/debug:ro
      - /lib/modules:/lib/modules:ro
      - /dev/shm:/dev/shm
    network_mode: host
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    command: ["/opt/drop/drop_agent", "-foreground", "-server_addr", "127.0.0.1:50051", "-apiserver_addr", "http://127.0.0.1:8191"]

volumes:
  pgdata:
  miniodata:
