[pg]
dsn = host=127.0.0.1 port=5432 user=drop password=drop dbname=drop sslmode=disable
; password should be set via DROP_PG_PASSWORD environment variable

[minio]
endpoint = 127.0.0.1:9000
; access_key should be set via DROP_S3_ACCESS_KEY environment variable
access_key = minioadmin
; secret_key should be set via DROP_S3_SECRET_KEY environment variable
secret_key = minioadmin
secure = false
bucket = drop-data

[llm]
# OpenAI-compatible API configuration
# api_key can also be set via DROP_LLM_API_KEY env var
api_key =
base_url = https://api.openai.com/v1
model = gpt-4o-mini
max_tokens = 2048
temperature = 0.3
