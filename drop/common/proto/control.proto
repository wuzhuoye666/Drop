syntax = "proto3";

package drop.control;

import "hotmethod.proto";

option go_package = "github.com/drop/apiserver/proto;proto";

service Control {
  // apiserver creates a task on drop_server
  rpc CreateTask(CreateTaskRequest)  returns (CreateTaskResponse);
  // apiserver fetches result data from drop_server
  rpc FetchData(FetchDataRequest)    returns (FetchDataResponse);
  // apiserver queries agent status via drop_server
  rpc StatAgent(StatAgentRequest)    returns (StatAgentResponse);
}

message CreateTaskRequest {
  string target_ip          = 1;
  string service            = 2;  // "hotmethod", etc.
  drop.hotmethod.TaskDesc task_desc = 3;
}

message CreateTaskResponse {
  bool   success    = 1;
  string message    = 2;
}

message FetchDataRequest {
  string task_id = 1;
}

message FetchDataResponse {
  bool   success      = 1;
  string cos_key      = 2;
  string error_message = 3;
}

message StatAgentRequest {
  string target_ip = 1;  // empty = all agents
}

message StatAgentResponse {
  repeated AgentInfo agents = 1;
}

message AgentInfo {
  string host_name     = 1;
  string ip_addr       = 2;
  bool   online        = 3;
  string uid           = 4;
  string agent_version = 5;
}
